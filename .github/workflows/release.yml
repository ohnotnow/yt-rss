name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binaries
        run: |
          # macOS
          GOOS=darwin GOARCH=amd64  go build -ldflags="-s -w" -o dist/yt-rss-darwin-amd64 ./cmd/
          GOOS=darwin GOARCH=arm64  go build -ldflags="-s -w" -o dist/yt-rss-darwin-arm64 ./cmd/

          # Linux
          GOOS=linux GOARCH=amd64   go build -ldflags="-s -w" -o dist/yt-rss-linux-amd64 ./cmd/
          GOOS=linux GOARCH=arm64   go build -ldflags="-s -w" -o dist/yt-rss-linux-arm64 ./cmd/

          # Windows
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o dist/yt-rss-windows-amd64.exe ./cmd/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
