<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>yt-rss</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@300;400&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --bg: #0a0a0a;
  --surface: #141414;
  --surface-hover: #1a1a1a;
  --border: #222;
  --text: #e8e4de;
  --text-dim: #b5afa9;
  --accent: #d4a04a;
  --accent-dim: #d4a04a;
  --grain-opacity: 0.03;
}

html {
  background: var(--bg);
  color: var(--text);
  font-family: 'Source Sans 3', sans-serif;
  font-weight: 300;
  min-height: 100vh;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  z-index: 9999;
  pointer-events: none;
  opacity: var(--grain-opacity);
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  background-size: 128px 128px;
}

header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: linear-gradient(180deg, var(--bg) 80%, transparent);
  padding: 1.25rem 2rem 1.5rem;
  display: flex;
  align-items: center;
  gap: 1.25rem;
  flex-wrap: wrap;
}

h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.4rem;
  letter-spacing: 0.15em;
  color: var(--accent);
  text-transform: uppercase;
  white-space: nowrap;
  flex-shrink: 0;
}

h1 span {
  color: var(--text-dim);
  font-weight: 300;
  letter-spacing: 0.05em;
}

.search-wrap {
  position: relative;
  flex: 1;
  min-width: 200px;
  max-width: 480px;
}

.search-wrap::before {
  content: '';
  position: absolute;
  left: 1rem;
  top: 50%;
  transform: translateY(-50%);
  width: 14px;
  height: 14px;
  border: 1.5px solid var(--text-dim);
  border-radius: 50%;
  pointer-events: none;
}

.search-wrap::after {
  content: '';
  position: absolute;
  left: 1.65rem;
  top: 50%;
  transform: translateY(-50%) rotate(-45deg);
  width: 1.5px;
  height: 6px;
  background: var(--text-dim);
  pointer-events: none;
}

#search {
  width: 100%;
  padding: 0.75rem 1rem 0.75rem 2.75rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 2px;
  color: var(--text);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.85rem;
  font-weight: 300;
  letter-spacing: 0.02em;
  outline: none;
  transition: border-color 0.3s ease;
}

#search::placeholder {
  color: var(--text-dim);
}

#search:focus {
  border-color: var(--accent-dim);
}

#count {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.7rem;
  color: var(--text-dim);
  margin-top: 0.6rem;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  min-height: 1em;
}

.categories {
  display: flex;
  gap: 0.4rem;
  flex-wrap: wrap;
  padding: 0 2rem 0.5rem;
}

.cat-pill {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.7rem;
  letter-spacing: 0.04em;
  padding: 0.35rem 0.75rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 2px;
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.2s ease;
  text-transform: uppercase;
}

.cat-pill:hover {
  border-color: var(--accent-dim);
  color: var(--text);
}

.cat-pill.active {
  background: var(--accent);
  border-color: var(--accent);
  color: var(--bg);
}

@media (max-width: 640px) {
  .categories { padding: 0 1rem 0.5rem; }
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 12px;
  background: var(--bg);
  padding: 12px;
}

.date-card {
  background: rgba(212, 160, 74, 0.80);
  color: var(--bg);
  font-weight: 600;
  font-size: 1.3rem;
  display: flex;
  align-items: center;
  justify-content: center;
  letter-spacing: 0.03em;
  animation: fadeIn 0.4s ease both;
  min-height: 160px;
}

.card {
  position: relative;
  background: var(--surface);
  text-decoration: none;
  color: inherit;
  display: block;
  overflow: hidden;
  transition: background 0.25s ease;
  animation: fadeIn 0.4s ease both;
}

.card:hover {
  background: var(--surface-hover);
}

.card:hover .thumb::after {
  opacity: 1;
}

.card:hover .thumb img {
  transform: scale(1.03);
}

.card:hover .meta {
  border-top-color: var(--accent-dim);
}

.thumb {
  position: relative;
  aspect-ratio: 16 / 9;
  overflow: hidden;
  background: #111;
}

.thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  transition: transform 0.4s ease;
}

.thumb::after {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.5));
  opacity: 0;
  transition: opacity 0.3s ease;
}

.duration {
  position: absolute;
  bottom: 0.4rem;
  right: 0.4rem;
  background: rgba(0,0,0,0.85);
  color: #fff;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.65rem;
  padding: 0.15rem 0.35rem;
  border-radius: 1px;
  letter-spacing: 0.05em;
  z-index: 2;
}

.meta {
  padding: 0.75rem 0.85rem;
  border-top: 1px solid var(--border);
  transition: border-color 0.25s ease;
}

.title {
  font-family: 'Source Sans 3', sans-serif;
  font-weight: 600;
  font-size: 0.9rem;
  line-height: 1.35;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  margin-bottom: 0.35rem;
}

.channel {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.65rem;
  color: var(--accent-dim);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 0.2rem;
}

.date {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.65rem;
  color: var(--text-dim);
  letter-spacing: 0.03em;
}

.empty {
  grid-column: 1 / -1;
  text-align: center;
  padding: 4rem 2rem;
  color: var(--text-dim);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.8rem;
  letter-spacing: 0.05em;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: translateY(0); }
}

@media (max-width: 640px) {
  header { padding: 1rem 1rem 1.5rem; }
  .grid { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); }
}

/* Settings / refresh buttons */
.settings-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-dim);
  cursor: pointer;
  padding: 0.5rem;
  border-radius: 2px;
  transition: all 0.2s ease;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}
#refreshBtn { margin-left: auto; }
#settingsBtn { margin-left: 0.4rem; }
.settings-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
}
.settings-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}
.settings-btn svg {
  width: 18px;
  height: 18px;
  fill: currentColor;
}
@keyframes spin { to { transform: rotate(360deg); } }
.settings-btn.spinning svg { animation: spin 0.8s linear infinite; }

/* Modal overlay */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 1000;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(4px);
  justify-content: center;
  align-items: flex-start;
  padding: 3rem 1rem;
  overflow-y: auto;
}
.modal-overlay.open { display: flex; }

.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  width: 100%;
  max-width: 680px;
  max-height: calc(100vh - 6rem);
  overflow-y: auto;
}

.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1rem 1.25rem;
  border-bottom: 1px solid var(--border);
}
.modal-header h2 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.2rem;
  letter-spacing: 0.1em;
  color: var(--accent);
  text-transform: uppercase;
}
.modal-close {
  background: none;
  border: none;
  color: var(--text-dim);
  cursor: pointer;
  font-size: 1.4rem;
  line-height: 1;
  padding: 0.25rem;
}
.modal-close:hover { color: var(--text); }

/* Tabs */
.modal-tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
}
.modal-tab {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.75rem;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  padding: 0.75rem 1.25rem;
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.2s ease;
}
.modal-tab:hover { color: var(--text); }
.modal-tab.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}

.tab-content { display: none; padding: 1.25rem; }
.tab-content.active { display: block; }

/* Forms and lists inside modal */
.settings-form {
  display: flex;
  gap: 0.5rem;
  margin-bottom: 1rem;
}
.settings-form input, .settings-form select {
  flex: 1;
  padding: 0.6rem 0.8rem;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 2px;
  color: var(--text);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.8rem;
  outline: none;
}
.settings-form input:focus, .settings-form select:focus {
  border-color: var(--accent-dim);
}
.settings-form select { max-width: 160px; }

.btn {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.75rem;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  padding: 0.6rem 1rem;
  border: 1px solid var(--accent);
  background: transparent;
  color: var(--accent);
  cursor: pointer;
  border-radius: 2px;
  transition: all 0.2s ease;
  white-space: nowrap;
}
.btn:hover { background: var(--accent); color: var(--bg); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn:disabled:hover { background: transparent; color: var(--accent); }
.btn-danger { border-color: #c0392b; color: #c0392b; }
.btn-danger:hover { background: #c0392b; color: #fff; }
.btn-sm { padding: 0.35rem 0.6rem; font-size: 0.65rem; }

.settings-table {
  width: 100%;
  border-collapse: collapse;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.75rem;
}
.settings-table th {
  text-align: left;
  padding: 0.5rem 0.6rem;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  font-weight: 400;
  border-bottom: 1px solid var(--border);
  font-size: 0.65rem;
}
.settings-table td {
  padding: 0.5rem 0.6rem;
  border-bottom: 1px solid var(--border);
  color: var(--text);
  vertical-align: middle;
}
.settings-table tr:last-child td { border-bottom: none; }

.fetch-status {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.75rem;
  color: var(--text-dim);
  margin-top: 1rem;
  max-height: 200px;
  overflow-y: auto;
  padding: 0.75rem;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 2px;
  white-space: pre-line;
}
.fetch-status:empty { display: none; }
.fetch-status .error { color: #c0392b; }
.fetch-status .ok { color: #27ae60; }
</style>
</head>
<body>

<header>
  <h1>yt-rss <span>video archive</span></h1>
  <div class="search-wrap">
    <input type="text" id="search" placeholder="Search videos..." autocomplete="off" spellcheck="false" autofocus>
  </div>
  <div id="count"></div>
  <button class="settings-btn" id="refreshBtn" title="Refresh all feeds">
    <svg viewBox="0 0 24 24"><path d="M17.65 6.35A7.958 7.958 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
  </button>
  <button class="settings-btn" id="settingsBtn" title="Settings">
    <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.49.49 0 00-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 00-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.49.49 0 00-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6A3.6 3.6 0 1112 8.4a3.6 3.6 0 010 7.2z"/></svg>
  </button>
</header>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <h2>Settings</h2>
      <button class="modal-close" id="modalClose">&times;</button>
    </div>
    <div class="modal-tabs">
      <button class="modal-tab active" data-tab="channels">Channels</button>
      <button class="modal-tab" data-tab="categories">Categories</button>
      <button class="modal-tab" data-tab="fetch">Fetch</button>
    </div>
    <div class="tab-content active" id="tab-channels">
      <div class="settings-form">
        <input type="text" id="addChannelUrl" placeholder="YouTube channel URL (e.g. youtube.com/@name)">
        <select id="addChannelCat"><option value="">No category</option></select>
        <button class="btn" id="addChannelBtn">Add</button>
      </div>
      <table class="settings-table">
        <thead><tr><th>Name</th><th>Category</th><th>Last fetched</th><th></th></tr></thead>
        <tbody id="channelsList"></tbody>
      </table>
    </div>
    <div class="tab-content" id="tab-categories">
      <div class="settings-form">
        <input type="text" id="addCatName" placeholder="New category name">
        <button class="btn" id="addCatBtn">Add</button>
      </div>
      <table class="settings-table">
        <thead><tr><th>Name</th><th></th></tr></thead>
        <tbody id="catsList"></tbody>
      </table>
    </div>
    <div class="tab-content" id="tab-fetch">
      <div class="settings-form">
        <select id="fetchChannelSelect"><option value="">All channels</option></select>
        <button class="btn" id="fetchBtn">Fetch</button>
      </div>
      <div class="fetch-status" id="fetchStatus"></div>
    </div>
  </div>
</div>

<div class="categories" id="categories"></div>
<main class="grid" id="grid"></main>

<script>
const grid = document.getElementById('grid');
const search = document.getElementById('search');
const count = document.getElementById('count');
const categoriesEl = document.getElementById('categories');

let debounce;
let activeCategory = null;

async function fetchVideos(q = '') {
  const params = new URLSearchParams({ limit: 100 });
  if (q) params.set('q', q);
  if (activeCategory) params.set('category', activeCategory);
  const res = await fetch(`/api/videos?${params}`);
  if (!res.ok) return [];
  return res.json();
}

async function fetchCategories() {
  const res = await fetch('/api/categories');
  if (!res.ok) return [];
  return res.json();
}

function renderCategories(categories) {
  if (!categories || !categories.length) {
    categoriesEl.innerHTML = '';
    return;
  }

  const allPill = `<button class="cat-pill${!activeCategory ? ' active' : ''}" data-id="">All</button>`;
  const pills = categories.map(c =>
    `<button class="cat-pill${activeCategory == c.id ? ' active' : ''}" data-id="${c.id}">${escapeHtml(c.name)}</button>`
  ).join('');

  categoriesEl.innerHTML = allPill + pills;

  categoriesEl.querySelectorAll('.cat-pill').forEach(btn => {
    btn.addEventListener('click', async () => {
      activeCategory = btn.dataset.id || null;
      renderCategories(categories);
      const videos = await fetchVideos(search.value.trim());
      render(videos);
    });
  });
}

function formatDate(iso) {
  const d = new Date(iso);
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
}

function render(videos) {
  if (!videos.length) {
    grid.innerHTML = '<div class="empty">No videos found</div>';
    count.textContent = '';
    return;
  }

  count.textContent = `${videos.length} video${videos.length !== 1 ? 's' : ''}`;

  let lastDate = '';
  grid.innerHTML = videos.map((v, i) => {
    const d = new Date(v.published_at);
    const dateKey = `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
    let separator = '';
    if (dateKey !== lastDate) {
      lastDate = dateKey;
      const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      separator = `<div class="date-card">${d.getDate()} ${months[d.getMonth()]}</div>`;
    }
    return separator + `
    <a class="card" href="${v.url}" target="_blank" rel="noopener" style="animation-delay: ${Math.min(i * 0.02, 0.5)}s">
      <div class="thumb">
        <img src="${v.thumbnail}" alt="" loading="lazy" onerror="this.style.display='none'">
      </div>
      <div class="meta">
        <div class="channel">${escapeHtml(v.channel_name || '')}</div>
        <div class="title">${escapeHtml(v.title)}</div>
        <div class="date">${formatDate(v.published_at)}</div>
      </div>
    </a>`;
  }).join('');
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

search.addEventListener('input', () => {
  clearTimeout(debounce);
  debounce = setTimeout(async () => {
    const videos = await fetchVideos(search.value.trim());
    render(videos);
  }, 250);
});

// --- Settings modal ---
const modalOverlay = document.getElementById('modalOverlay');
const settingsBtn = document.getElementById('settingsBtn');
const modalClose = document.getElementById('modalClose');

settingsBtn.addEventListener('click', () => { openSettings(); });
modalClose.addEventListener('click', () => { closeSettings(); });
modalOverlay.addEventListener('click', (e) => { if (e.target === modalOverlay) closeSettings(); });

function openSettings() {
  modalOverlay.classList.add('open');
  loadChannels();
  loadSettingsCategories();
  loadFetchChannels();
}

function closeSettings() {
  modalOverlay.classList.remove('open');
}

// Tabs
document.querySelectorAll('.modal-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.modal-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
  });
});

// Channels tab
async function loadChannels() {
  const res = await fetch('/api/channels');
  if (!res.ok) return;
  const channels = await res.json();
  const tbody = document.getElementById('channelsList');
  if (!channels || !channels.length) {
    tbody.innerHTML = '<tr><td colspan="4" style="color:var(--text-dim)">No channels yet</td></tr>';
    return;
  }
  tbody.innerHTML = channels.map(c => `
    <tr>
      <td>${escapeHtml(c.name)}</td>
      <td>${escapeHtml(c.category_name || '-')}</td>
      <td>${c.last_fetched ? formatDate(c.last_fetched) : 'never'}</td>
      <td><button class="btn btn-danger btn-sm" onclick="deleteChannel(${c.id})">Remove</button></td>
    </tr>
  `).join('');

  // Also populate category dropdown for add channel form
  const catRes = await fetch('/api/categories');
  if (!catRes.ok) return;
  const cats = await catRes.json();
  const sel = document.getElementById('addChannelCat');
  sel.innerHTML = '<option value="">No category</option>' +
    (cats || []).map(c => `<option value="${c.id}">${escapeHtml(c.name)}</option>`).join('');
}

document.getElementById('addChannelBtn').addEventListener('click', async () => {
  const urlInput = document.getElementById('addChannelUrl');
  const catSelect = document.getElementById('addChannelCat');
  const btn = document.getElementById('addChannelBtn');
  const url = urlInput.value.trim();
  if (!url) return;

  btn.disabled = true;
  btn.textContent = 'Adding...';
  try {
    const body = { url };
    if (catSelect.value) body.category_id = parseInt(catSelect.value);
    const res = await fetch('/api/channels', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!res.ok) {
      const text = await res.text();
      alert('Error: ' + text);
      return;
    }
    urlInput.value = '';
    loadChannels();
  } finally {
    btn.disabled = false;
    btn.textContent = 'Add';
  }
});

async function deleteChannel(id) {
  if (!confirm('Remove this channel and all its videos?')) return;
  const res = await fetch('/api/channels/' + id, { method: 'DELETE' });
  if (!res.ok) {
    alert('Error removing channel');
    return;
  }
  loadChannels();
}

// Categories tab
async function loadSettingsCategories() {
  const res = await fetch('/api/categories');
  if (!res.ok) return;
  const cats = await res.json();
  const tbody = document.getElementById('catsList');
  if (!cats || !cats.length) {
    tbody.innerHTML = '<tr><td colspan="2" style="color:var(--text-dim)">No categories yet</td></tr>';
    return;
  }
  tbody.innerHTML = cats.map(c => `
    <tr>
      <td>${escapeHtml(c.name)}</td>
      <td><button class="btn btn-danger btn-sm" onclick="deleteCategory(${c.id})">Remove</button></td>
    </tr>
  `).join('');
}

document.getElementById('addCatBtn').addEventListener('click', async () => {
  const input = document.getElementById('addCatName');
  const name = input.value.trim();
  if (!name) return;

  const res = await fetch('/api/categories', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name }),
  });
  if (!res.ok) {
    const text = await res.text();
    alert('Error: ' + text);
    return;
  }
  input.value = '';
  loadSettingsCategories();
  // Refresh the main page category pills too
  const cats = await fetchCategories();
  renderCategories(cats);
});

async function deleteCategory(id) {
  if (!confirm('Remove this category? Channels will become uncategorised.')) return;
  const res = await fetch('/api/categories/' + id, { method: 'DELETE' });
  if (!res.ok) {
    alert('Error removing category');
    return;
  }
  loadSettingsCategories();
  const cats = await fetchCategories();
  renderCategories(cats);
}

// Fetch tab
async function loadFetchChannels() {
  const res = await fetch('/api/channels');
  if (!res.ok) return;
  const channels = await res.json();
  const sel = document.getElementById('fetchChannelSelect');
  sel.innerHTML = '<option value="">All channels</option>' +
    (channels || []).map(c => `<option value="${c.id}">${escapeHtml(c.name)}</option>`).join('');
}

document.getElementById('fetchBtn').addEventListener('click', async () => {
  const btn = document.getElementById('fetchBtn');
  const status = document.getElementById('fetchStatus');
  const sel = document.getElementById('fetchChannelSelect');
  const channelId = sel.value;

  btn.disabled = true;
  btn.textContent = 'Fetching...';
  const label = channelId ? sel.options[sel.selectedIndex].text : 'all channels';
  status.innerHTML = 'Fetching ' + escapeHtml(label) + ', please wait...';

  try {
    const url = channelId ? '/api/fetch?id=' + channelId : '/api/fetch';
    const res = await fetch(url, { method: 'POST' });
    if (!res.ok) {
      status.innerHTML = '<span class="error">Error: ' + escapeHtml(await res.text()) + '</span>';
      return;
    }
    const results = await res.json();
    status.innerHTML = results.map(r => {
      if (r.error) return `<span class="error">${escapeHtml(r.channel_name)}: ${escapeHtml(r.error)}</span>`;
      return `<span class="ok">${escapeHtml(r.channel_name)}: ${r.video_count} videos</span>`;
    }).join('\n');

    // Refresh the main video grid
    const videos = await fetchVideos(search.value.trim());
    render(videos);
    // Refresh channel list (last fetched times)
    loadChannels();
  } finally {
    btn.disabled = false;
    btn.textContent = 'Fetch';
  }
});

// --- Quick refresh button ---
document.getElementById('refreshBtn').addEventListener('click', async () => {
  const btn = document.getElementById('refreshBtn');
  btn.disabled = true;
  btn.classList.add('spinning');

  try {
    const res = await fetch('/api/fetch', { method: 'POST' });
    if (res.ok) {
      const videos = await fetchVideos(search.value.trim());
      render(videos);
      loadChannels();
    }
  } finally {
    btn.disabled = false;
    btn.classList.remove('spinning');
  }
});

// --- Init ---
(async () => {
  const [videos, categories] = await Promise.all([fetchVideos(), fetchCategories()]);
  renderCategories(categories);
  render(videos);
})();
</script>

</body>
</html>
