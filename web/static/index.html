<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>yt-rss</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@300;400&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --bg: #0a0a0a;
  --surface: #141414;
  --surface-hover: #1a1a1a;
  --border: #222;
  --text: #e8e4de;
  --text-dim: #b5afa9;
  --accent: #d4a04a;
  --accent-dim: #d4a04a;
  --grain-opacity: 0.03;
}

html {
  background: var(--bg);
  color: var(--text);
  font-family: 'Source Sans 3', sans-serif;
  font-weight: 300;
  min-height: 100vh;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  z-index: 9999;
  pointer-events: none;
  opacity: var(--grain-opacity);
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  background-size: 128px 128px;
}

header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: linear-gradient(180deg, var(--bg) 80%, transparent);
  padding: 1.25rem 2rem 1.5rem;
  display: flex;
  align-items: center;
  gap: 1.25rem;
  flex-wrap: wrap;
}

h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.4rem;
  letter-spacing: 0.15em;
  color: var(--accent);
  text-transform: uppercase;
  white-space: nowrap;
  flex-shrink: 0;
}

h1 span {
  color: var(--text-dim);
  font-weight: 300;
  letter-spacing: 0.05em;
}

.search-wrap {
  position: relative;
  flex: 1;
  min-width: 200px;
  max-width: 480px;
}

.search-wrap::before {
  content: '';
  position: absolute;
  left: 1rem;
  top: 50%;
  transform: translateY(-50%);
  width: 14px;
  height: 14px;
  border: 1.5px solid var(--text-dim);
  border-radius: 50%;
  pointer-events: none;
}

.search-wrap::after {
  content: '';
  position: absolute;
  left: 1.65rem;
  top: 50%;
  transform: translateY(-50%) rotate(-45deg);
  width: 1.5px;
  height: 6px;
  background: var(--text-dim);
  pointer-events: none;
}

#search {
  width: 100%;
  padding: 0.75rem 1rem 0.75rem 2.75rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 2px;
  color: var(--text);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.85rem;
  font-weight: 300;
  letter-spacing: 0.02em;
  outline: none;
  transition: border-color 0.3s ease;
}

#search::placeholder {
  color: var(--text-dim);
}

#search:focus {
  border-color: var(--accent-dim);
}

#count {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.7rem;
  color: var(--text-dim);
  margin-top: 0.6rem;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  min-height: 1em;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 12px;
  background: var(--bg);
  padding: 12px;
}

.card {
  position: relative;
  background: var(--surface);
  text-decoration: none;
  color: inherit;
  display: block;
  overflow: hidden;
  transition: background 0.25s ease;
  animation: fadeIn 0.4s ease both;
}

.card:hover {
  background: var(--surface-hover);
}

.card:hover .thumb::after {
  opacity: 1;
}

.card:hover .thumb img {
  transform: scale(1.03);
}

.card:hover .meta {
  border-top-color: var(--accent-dim);
}

.thumb {
  position: relative;
  aspect-ratio: 16 / 9;
  overflow: hidden;
  background: #111;
}

.thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  transition: transform 0.4s ease;
}

.thumb::after {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.5));
  opacity: 0;
  transition: opacity 0.3s ease;
}

.duration {
  position: absolute;
  bottom: 0.4rem;
  right: 0.4rem;
  background: rgba(0,0,0,0.85);
  color: #fff;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.65rem;
  padding: 0.15rem 0.35rem;
  border-radius: 1px;
  letter-spacing: 0.05em;
  z-index: 2;
}

.meta {
  padding: 0.75rem 0.85rem;
  border-top: 1px solid var(--border);
  transition: border-color 0.25s ease;
}

.title {
  font-family: 'Source Sans 3', sans-serif;
  font-weight: 600;
  font-size: 0.9rem;
  line-height: 1.35;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  margin-bottom: 0.35rem;
}

.channel {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.65rem;
  color: var(--accent-dim);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 0.2rem;
}

.date {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.65rem;
  color: var(--text-dim);
  letter-spacing: 0.03em;
}

.empty {
  grid-column: 1 / -1;
  text-align: center;
  padding: 4rem 2rem;
  color: var(--text-dim);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.8rem;
  letter-spacing: 0.05em;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: translateY(0); }
}

@media (max-width: 640px) {
  header { padding: 1rem 1rem 1.5rem; }
  .grid { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); }
}
</style>
</head>
<body>

<header>
  <h1>yt-rss <span>video archive</span></h1>
  <div class="search-wrap">
    <input type="text" id="search" placeholder="Search videos..." autocomplete="off" spellcheck="false" autofocus>
  </div>
  <div id="count"></div>
</header>

<main class="grid" id="grid"></main>

<script>
const grid = document.getElementById('grid');
const search = document.getElementById('search');
const count = document.getElementById('count');

let debounce;

async function fetchVideos(q = '') {
  const params = new URLSearchParams({ limit: 100 });
  if (q) params.set('q', q);
  const res = await fetch(`/api/videos?${params}`);
  if (!res.ok) return [];
  return res.json();
}

function formatDate(iso) {
  const d = new Date(iso);
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
}

function render(videos) {
  if (!videos.length) {
    grid.innerHTML = '<div class="empty">No videos found</div>';
    count.textContent = '';
    return;
  }

  count.textContent = `${videos.length} video${videos.length !== 1 ? 's' : ''}`;

  grid.innerHTML = videos.map((v, i) => `
    <a class="card" href="${v.url}" target="_blank" rel="noopener" style="animation-delay: ${Math.min(i * 0.02, 0.5)}s">
      <div class="thumb">
        <img src="${v.thumbnail}" alt="" loading="lazy" onerror="this.style.display='none'">
      </div>
      <div class="meta">
        <div class="channel">${escapeHtml(v.channel_name || '')}</div>
        <div class="title">${escapeHtml(v.title)}</div>
        <div class="date">${formatDate(v.published_at)}</div>
      </div>
    </a>
  `).join('');
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

search.addEventListener('input', () => {
  clearTimeout(debounce);
  debounce = setTimeout(async () => {
    const videos = await fetchVideos(search.value.trim());
    render(videos);
  }, 250);
});

(async () => {
  const videos = await fetchVideos();
  render(videos);
})();
</script>

</body>
</html>
